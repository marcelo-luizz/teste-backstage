apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-gcp-secret
  title: Create Multiple Secrets in GCP
  description: Template para criar ou atualizar múltiplos secrets no GCP Secret Manager
  tags:
    - gcp
    - secret-manager
spec:
  owner: guest
  type: service
  
  parameters:
    - title: Projeto e Configurações
      required: 
        - project_id
        - secrets
      properties:
        project_id:
          title: Projeto GCP
          type: string
          enum:
            - devops-labs-397603
        
        secrets:
          title: Lista de Secrets
          description: Clique no botão de "+" ou "Add Item" para incluir vários secrets de uma vez.
          type: array
          minItems: 1
          items:
            type: object
            required: 
              - name
              - value
            properties:
              name:
                title: Secret ID (Chave)
                description: "Ex: MINHA_VARIAVEL_GKE_PRD"
                type: string
                pattern: '^[A-Z0-9_]+$'
              value:
                title: Secret Value (Valor)
                type: string
                # A configuração abaixo transforma o campo em um input de "senha" na tela
                ui:widget: password 
                ui:backstage:
                  review:
                    mask: true # Esconde os valores na tela de revisão final

  steps:
    - id: upsert-secrets-action
      name: Criando e Atualizando Secrets no GCP
      # Aqui nós chamamos a custom action Node.js que você acabou de criar!
      action: gcp:secrets-manager:upsert
      input:
        project: ${{ parameters.project_id }}
        secrets: ${{ parameters.secrets }}

  output:
    links:
      - title: Visualizar Secrets no Console do GCP
        url: https://console.cloud.google.com/security/secret-manager?project=${{ parameters.project_id }}
