apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-gcp-secret
  title: Create or Update Secrets in GCP
  description: Template for creating or updating secrets in GCP Secrets Manager.
  tags:
    - gcp
    - secret-manager
spec:
  owner: guest
  type: service
  parameters:
    - title: Configuração da Operação
      required:
        - operation_type
        - secret_type
        - squad_owner
        - project_id
      properties:
        operation_type:
          title: O que você deseja fazer?
          type: string
          enum:
            - create
            - update
          enumNames:
            - 'Criar novo(s) Secret(s)'
            - 'Atualizar Secret(s) Existente(s)'
          default: create
          ui:widget: radio
        secret_type:
          title: Qual o destino/tipo desta Secret?
          description: |
            **Regras de Prefixo Automático Aplicadas:**
            * **GKE:** Muda conforme projeto (Ex: `GKE_INTEGRATION_`, `GKE_PRE_PROD_`, `GKE_PROD_`)
            * **Airflow:** Padrão fixo (`AIRFLOW_VARIABLES_`)
            * **Database:**
          type: string
          enum:
            - gke
            - airflow
            - database_credentials
          enumNames:
            - '📦 GKE Variables'
            - '🌪️ Apache Airflow'
            - '🗄️ Database Credentials'
          default: gke
          ui:widget: radio
        project_id:
          title: Projeto GCP
          type: string
          enum:
            - devops-labs-397603
            - jeitto-integracao
            - jeitto-pre-prod
            - jeitto-prod
            - stage-1.0
            - homolog-1.0
            - prod-1.0
          enumNames:
            - 'Devops Labs (devops-labs-397603)'
            - 'Integração (jeitto-integracao)'
            - 'Pré Produção (jeitto-pre-prod)'
            - 'Produção (jeitto-prod)'
            - 'Stage (jeitto-backend-homolog)'
            - 'Homologação (jeitto-backend-homolog)'
            - 'Produção (jeitto-backend-prod)'
        squad_owner:
          title: Squad Owner
          type: string
          description: Nome da Squad Responsável
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group
    - title: Preenchimento das Secrets
      required: 
        - secrets
      properties:
        secrets:
          title: Secrets
          description: O prefixo selecionado na etapa anterior será adicionado automaticamente.
          type: array
          minItems: 1
          ui:options:
            itemTitleProp: name
          items:
            type: object
            required: 
              - name
              - value
            properties:
              name:
                title: Nome da Secret (SEM O PREFIXO)
                description: "Digite apenas o nome base. Ex: MINHA_VARIAVEL. Apenas letras MAIÚSCULAS, números e _"
                type: string
                pattern: '^[A-Z0-9_]+$'
              value:
                title: Secret Value (Valor)
                type: string
                ui:backstage:
                  review:
                    mask: true 
  steps:
    - id: upsert-secrets-action
      name: Executando Operação no GCP
      action: gcp:secrets-manager:upsert
      input:
        project: ${{ parameters.project_id }}
        operation: ${{ parameters.operation_type }}
        secret_type: ${{ parameters.secret_type }} 
        secrets: ${{ parameters.secrets }}
        labels:
          owner: ${{ user.entity.spec.profile.email }}
          squad_owner: ${{ (parameters.squad_owner | parseEntityRef).name }}
          environment: ${{ parameters.project_id }}
          created_by: "backstage"
  output:
    links:
      - title: Visualizar Secrets no Console do GCP
        url: https://console.cloud.google.com/security/secret-manager?project=${{ parameters.project_id }}
    
    text:
      - title: 🎉 Operação concluída com sucesso!
        content: |
          Suas variáveis foram processadas no GCP Secret Manager.
          
          ---
          
          ### 📖 Como utilizar essa Secret no GKE (Kubernetes)
          
          Para injetar essa variável de forma segura na sua aplicação, você precisará criar um manifesto do **ExternalSecret** e conectá-lo ao seu **Deployment**.
          
          #### 1. Criar o ExternalSecret
          Este manifesto busca a secret do GCP e cria uma Secret nativa do Kubernetes no seu namespace.
          
          ```yaml
          apiVersion: external-secrets.io/v1beta1
          kind: ExternalSecret
          metadata:
            name: minha-app-secrets
            namespace: meu-namespace
          spec:
            refreshInterval: 1h
            secretStoreRef:
              kind: ClusterSecretStore
              name: gcp-secret-store # Nome do seu Store configurado no cluster
            target:
              name: k8s-secret-gerada # Nome do secret que será criado DENTRO do K8s
              creationPolicy: Owner
            data:
              - secretKey: MINHA_VARIAVEL_NO_POD
                remoteRef:
                  # Substitua pelo NOME COMPLETO salvo no GCP (Prefixo + Nome digitado)
                  key: GKE_INTEGRATION_MINHA_VARIAVEL 
          ```
          
          #### 2. Adicionar ao Deployment
          No manifesto de Deployment da sua aplicação, injete a Secret criada como variáveis de ambiente (`envFrom`):
          
          ```yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: minha-aplicacao
          spec:
            template:
              spec:
                containers:
                  - name: app-container
                    image: minha-imagem:latest
                    envFrom:
                      - secretRef:
                          # Deve ser idêntico ao "target.name" do passo anterior
                          name: k8s-secret-gerada 
          ```
